# git-cliff ~ configuration for changelog generation
# https://github.com/orhun/git-cliff

[changelog]
# Changelog header
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
# Template for the changelog body
body = """
{% if version %}\
    ## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits | filter(attribute="scope") %}
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
            {{ commit.message | upper_first }}\
    {% else %}
        {% for commit in commits %}
            - {{ commit.message | upper_first }}\
        {% endfor %}
    {% endfor %}
{% endfor %}\n
"""
# Template for the changelog footer
footer = """
<!-- generated by git-cliff -->
"""
# Whether to remove the leading 'v' from version numbers
trim = true
# Post-process message lines
postprocessors = [
  { pattern = '<([^>]+)>', replace = "" }, # Remove email-style author tags
  { pattern = '\(#(\d+)\)', replace = "" }, # Remove PR reference numbers
]

[git]
# Parse conventional commits
conventional_commits = true
# Filter out commits that match these patterns
commit_preprocessors = [
  { pattern = '\(.*\)', replace = "" }, # Strip scope parens for cleaner display
]
# Filter commits by these types
filter_unconventional = true
# Split commits into groups by these types
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^revert", group = "Reverts" },
  { message = "^refactor", group = "Refactor" },
  { message = "^style", group = "Styling" },
  { message = "^test", group = "Testing" },
  { message = "^docs", group = "Documentation" },
  { message = "^chore", group = "Chores" },
  { message = "^ci", group = "CI/CD" },
]
# Protect these from being filtered out
filter_commits = false
# Sort the groups alphabetically
sort_groups = false
