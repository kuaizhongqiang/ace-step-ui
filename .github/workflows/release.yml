name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write # needed for npm provenance

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      # ── Install & Build ──────────────────────────────────────────
      - name: Install UI dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # ── Publish: ace-step-ui-ui (frontend) ─────────────────────
      - name: Publish UI to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Publish: ace-step-ui-server ────────────────────────────
      - name: Install & publish server
        working-directory: server
        run: |
          npm ci --ignore-scripts 2>/dev/null || true
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Publish: ace-step-ui-cli ───────────────────────────────
      - name: Publish CLI
        working-directory: cli
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── GitHub Release ──────────────────────────────────────────
      - name: Generate Changelog
        id: changelog
        run: |
          {
            echo "# v${GITHUB_REF_NAME}"
            echo ""
            echo "## Changes"
            git log --oneline --no-decorate $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD 2>/dev/null || git log --oneline -10
          } > CHANGELOG.md
          cat CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            dist/**
            server/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
